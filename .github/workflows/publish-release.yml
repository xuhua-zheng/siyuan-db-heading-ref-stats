name: Publish Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-release.yml"
      - "assets/**"
      - "src/**"
      - "i18n/**"
      - "README.md"
      - "README_zh_CN.md"
      - "icon.png"
      - "preview.png"
      - "package.json"
      - "plugin.json"
      - "pnpm-lock.yaml"
      - "webpack.config.js"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build package
        run: pnpm run build

      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(node -p "require('./plugin.json').version")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::notice::Tag $tag does not exist. Skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::Release $tag already exists. Skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" package.zip \
            --title "${{ steps.release.outputs.tag }}" \
            --notes "SiYuan marketplace package for ${{ steps.release.outputs.tag }}." \
            --latest
